name: Unlocker VoLTE + VoWifi
on:
  workflow_dispatch:

permissions:
  contents: write # Permiso obligatorio para crear la Release

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        repository: ryfineZ/carrier-ims-for-pixel
        ref: refs/pull/61/head

    - name: Inyectar Perfil Universal España (VoLTE/VoWiFi/VoNR)
      run: |
        python3 -c '
        import os, re
        for root, dirs, files in os.walk("."):
            for f in files:
                if f == "ImsModifier.kt":
                    path = os.path.join(root, f)
                    with open(path, "r") as file:
                        content = file.read()
                    match = re.search(r"fun\s+overrideConfig\s*\((.*?)\)", content, re.DOTALL)
                    if match:
                        params = match.group(1)
                        bundle_match = re.search(r"([a-zA-Z0-9_]+)\s*:\s*PersistableBundle", params)
                        if bundle_match:
                            var_name = bundle_match.group(1)
                            func_start_match = re.search(r"fun\s+overrideConfig\s*\(.*?\)[^{]*\{", content, re.DOTALL)
                            if func_start_match:
                                end_idx = func_start_match.end()
                                injection = (
                                    f"\n        {var_name}.putBoolean(\"carrier_wfc_entitlement_status_required_bool\", false)"
                                    f"\n        {var_name}.putBoolean(\"carrier_wfc_ims_available_bool\", true)"
                                    f"\n        {var_name}.putBoolean(\"carrier_default_wfc_ims_enabled_bool\", true)"
                                    f"\n        {var_name}.putBoolean(\"editable_wfc_mode_bool\", true)"
                                    f"\n        {var_name}.putBoolean(\"editable_wfc_roaming_mode_bool\", true)"
                                    f"\n        {var_name}.putBoolean(\"carrier_volte_available_bool\", true)"
                                    f"\n        {var_name}.putBoolean(\"carrier_default_volte_enabled_bool\", true)"
                                    f"\n        {var_name}.putBoolean(\"vonr_enabled_bool\", true)"
                                    f"\n        {var_name}.putBoolean(\"vonr_setting_visibility_bool\", true)"
                                    f"\n        {var_name}.putString(\"sim_country_iso_override_string\", \"es\")\n"
                                )
                                content = content[:end_idx] + injection + content[end_idx:]
                                with open(path, "w") as file:
                                    file.write(content)
                                print("¡Inyector universal para España aplicado con éxito!")
        '

    - name: Configurar JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Dar permisos a Gradlew
      run: chmod +x gradlew

    - name: Generar Keystore Dummy Certificado
      run: |
        keytool -genkeypair -v -keystore /tmp/dummy.jks -alias dummy_alias -keyalg RSA -keysize 2048 -validity 10000 -storepass dummy_password -keypass dummy_password -dname "CN=PixelIMS, O=Android, C=US"

    - name: Compilar APK Optimizada (Release Mode)
      env:
        SIGN_KEY_STORE_FILE: "/tmp/dummy.jks"
        SIGN_KEY_STORE_PASSWORD: "dummy_password"
        SIGN_KEY_ALIAS: "dummy_alias"
        SIGN_KEY_PASSWORD: "dummy_password"
      run: ./gradlew assembleRelease

    - name: Publicar APK en la sección de Releases
      uses: softprops/action-gh-release@v2
      with:
        files: app/build/outputs/apk/release/app-release.apk
        tag_name: v1.17-es
        name: "Unlocker VoLTE + VoWifi (Android 17)"
        body: |
          🚀 **Compilación automática optimizada para España**
          
          Este APK se genera de forma automatizada resolviendo las limitaciones de firmas de Android 17 e inyectando las configuraciones esenciales para operadores españoles.
          
          ### 📚 Créditos y Origen:
          * **Código Base Original:** Basado en el proyecto principal de **[vvb2060/carrier-ims-for-pixel](https://github.com/vvb2060/carrier-ims-for-pixel)**.
          * **Parche Android 17:** Incorpora los cambios del **Pull Request #61** enviado por **[ryfineZ](https://github.com/ryfineZ/carrier-ims-for-pixel/pull/61)** para dar soporte inicial al nuevo sistema operativo.
          
          ### 📱 Modificaciones inyectadas para España:
          * **Desbloqueo de Región Extranjera:** Fuerza la carga de red (`sim_country_iso_override_string=es`) permitiendo el funcionamiento en Pixel importados de **EE. UU., Japón o Reino Unido**.
          * **Salto de Entitlement:** Desactiva la verificación del operador para las llamadas Wi-Fi (`carrier_wfc_entitlement_status_required_bool=false`).
          * **Soporte Avanzado:** Activa por defecto VoLTE, VoWiFi y VoNR (Llamadas sobre 5G) en cualquier operador español compatible (Pepephone, Movistar, O2, Orange, Vodafone, Digi, Yoigo, etc.).
        make_latest: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
