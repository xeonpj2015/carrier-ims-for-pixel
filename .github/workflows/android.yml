name: Compilacion Manual Android 17
on:
  workflow_dispatch: # Nos permite activarlo con un boton a mano

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        repository: ryfineZ/carrier-ims-for-pixel
        ref: refs/pull/61/head

    - name: Configurar JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Dar permisos a Gradlew
      run: chmod +x gradlew

    - name: Compilar APK de depuracion
      env:
        SIGN_KEY_STORE_FILE: "gradle.properties" # Engañamos a Gradle apuntando a un archivo que sí existe
        SIGN_KEY_STORE_PASSWORD: "dummy_password"
        SIGN_KEY_ALIAS: "dummy_alias"
        SIGN_KEY_PASSWORD: "dummy_password"
      run: ./gradlew assembleDebug

    - name: Subir APK generado
      uses: actions/upload-artifact@v4
      with:
        name: PixelIMS-Android17-Fix
        path: app/build/outputs/apk/debug/app-debug.apk
